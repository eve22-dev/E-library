<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-library | Login Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center py-4 bg-light">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5 text-center">
                        
                        <header class="mb-4">
                            <h1 class="display-6 fw-bold text-primary">E-library</h1>
                            <p class="text-muted small">Selecione seu perfil</p>
                        </header>

                        <div class="btn-group w-100 mb-4" role="group">
                            <input type="radio" class="btn-check" name="userType" id="aluno" value="aluno" checked>
                            <label class="btn btn-outline-primary" for="aluno">Sou Aluno</label>

                            <input type="radio" class="btn-check" name="userType" id="funcionario" value="funcionario">
                            <label class="btn btn-outline-primary" for="funcionario">Sou Funcionário</label>
                        </div>

                        <form id="loginForm">
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="email" placeholder="nome@fatec.sp.gov.br" required>
                                <label for="email text-start">E-mail Institucional</label>
                            </div>
                            
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="password" placeholder="Senha" required>
                                <label for="password">Senha</label>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Entrar</button>
                        </form>

                        <div class="mt-4">
                            <p class="small text-muted">Problemas para entrar? <a href="#" class="text-decoration-none">Contatar Suporte</a></p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
</body>
