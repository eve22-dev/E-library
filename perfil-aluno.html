<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-library | Perfil</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

    <script>
        checkAuth();
    </script>
</head>

<div class="profile-header d-flex flex-column align-items-center justify-content-center">
    <h2 class="fw-bold mb-3">Meu Perfil</h2> <div class="avatar-wrapper shadow">
        <i class="bi bi-person-circle"></i>
    </div>
</div>

<div class="container text-center mb-5">
    <div class="mt-2">
        <h3 class="fw-bold text-dark mb-0">Aluno Silva</h3>
        <p class="text-muted">RGM: 123.456-7</p>
    </div>

    <div class="row mt-4 justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card info-card shadow-sm p-4 border-0 rounded-4">
                <div class="row g-4 text-start">
                    <div class="col-md-6">
                        <label class="label-custom d-block">Curso</label>
                        <span class="value-custom">ADS - Análise e Des. de Sistemas</span>
                    </div>
                    <div class="col-md-6">
                        <label class="label-custom d-block">E-mail Institucional</label>
                        <span class="value-custom">aluno@cs.ceunsp.edu.br</span>
                    </div>
                    <div class="col-md-6">
                        <label class="label-custom d-block text-uppercase small fw-bold text-muted">Situação Acadêmica</label>
                        <span class="badge bg-success rounded-pill px-3">Em Dia</span>
                    </div>
                    <div class="col-md-6">
                        <label class="label-custom d-block text-uppercase small fw-bold text-muted">Livros em Empréstimo</label>
                        <span class="value-custom" id="contadorLivros">01 de 03 permitidos</span>
                    </div>
                </div>
                
                <hr class="my-4 opacity-25">

                <div class="text-start mb-4">
                    <h6 class="fw-bold text-dark mb-3"><i class="bi bi-clock-history text-warning me-2"></i>Empréstimos Ativos</h6>
                    <ul class="list-group">
                        <li class="list-group-item d-flex justify-content-between align-items-center border-0 shadow-sm mb-2 rounded bg-light">
                            <div>
                                <span class="fw-bold d-block"><i class="bi bi-book-half text-secondary me-2"></i>Clean Code</span>
                                <small class="text-muted ms-4">Devolução: 20/06/2026</small>
                            </div>
                            <span class="badge bg-warning text-dark rounded-pill" style="font-size: 0.75rem;">Perto do prazo</span>
                        </li>
                    </ul>
                </div>

                <div class="text-start" id="secaoReservas" style="display: none;">
                    <h6 class="fw-bold text-primary mb-3"><i class="bi bi-bookmark-check me-2"></i>Minhas Novas Reservas</h6>
                    <ul class="list-group" id="listaReservas">
                        </ul>
                </div>

                <hr class="my-4 opacity-25">

                <div class="d-flex justify-content-center">
                    <a href="home-aluno.html" class="btn btn-outline-primary rounded-pill px-5">Voltar</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const reservas = JSON.parse(localStorage.getItem('minhasReservas')) || [];
        
        // Atualiza o contador de livros (1 fixo do Clean Code + quantidade de novas reservas)
        const totalLivros = 1 + reservas.length;
        document.getElementById('contadorLivros').innerText = `${totalLivros.toString().padStart(2, '0')} de 03 permitidos`;

        // Se houver novas reservas no localStorage, exibe na Seção 2
        if (reservas.length > 0) {
            document.getElementById('secaoReservas').style.display = 'block';
            const lista = document.getElementById('listaReservas');
            
            reservas.forEach(livro => {
                lista.innerHTML += `
                    <li class="list-group-item d-flex justify-content-between align-items-center border-0 shadow-sm mb-2 rounded">
                        <span><i class="bi bi-bookmark text-primary me-2"></i> ${livro}</span>
                        <span class="badge bg-info text-dark rounded-pill" style="font-size: 0.75rem;">Aguardando Retirada</span>
                    </li>
                `;
            });
        }
    });
</script>
